<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Compass</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 48px;
    }
    .wrap { width: 100%; max-width: 440px; padding: 32px 16px 0; }
    header { text-align: center; margin-bottom: 6px; }
    h1 { font-size: 1.6rem; margin: 0; }
    .date-line {
      color: var(--muted); font-size: 0.9rem; text-align: center; margin-bottom: 28px;
    }
    .apps { display: grid; gap: 14px; }
    .app-tile {
      display: flex; align-items: center; gap: 14px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 16px;
      color: var(--text); text-decoration: none;
      transition: border-color 0.15s, transform 0.05s;
    }
    .app-tile:hover { border-color: var(--accent); }
    .app-tile:active { transform: scale(0.98); }
    .app-tile.soon { opacity: 0.5; pointer-events: none; }
    .app-icon { font-size: 1.8rem; }
    .app-text { display: flex; flex-direction: column; }
    .app-name { font-weight: 600; font-size: 1.05rem; }
    .app-desc { color: var(--muted); font-size: 0.85rem; }
    .soon-tag {
      margin-left: auto; font-size: 0.7rem; color: var(--muted);
      border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px;
    }
    .topbar {
      width: 100%;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.85rem; color: var(--muted);
      padding: 12px 20px; border-bottom: 1px solid var(--border);
    }
    .link-btn {
      background: none; border: none; color: var(--accent);
      cursor: pointer; font-size: 0.8rem; padding: 0; text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="link-btn" href="index.html">← Home</a>
    <span id="whoami"></span>
    <button class="link-btn" id="logoutBtn">Log out</button>
  </div>
  <div class="wrap">
    <header>
      <h1>🧭 Daily Compass</h1>
    </header>
    <div class="date-line" id="today"></div>

    <div class="apps">
      <a class="app-tile" href="health-log.html">
        <span class="app-icon">🩺</span>
        <span class="app-text">
          <span class="app-name">Health Log</span>
          <span class="app-desc">Wakeup, eating window, sleep</span>
        </span>
      </a>

      <!-- Future apps: drop a tile here + create its .html file -->
      <a class="app-tile soon" href="#">
        <span class="app-icon">📊</span>
        <span class="app-text">
          <span class="app-name">Stats</span>
          <span class="app-desc">Trends across aspects</span>
        </span>
        <span class="soon-tag">Soon</span>
      </a>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const SUPABASE_URL = 'https://twpzcszcvylhaopcwqkv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_c1BhUlrZPf2YsXW_5LdrZw_-wYh4lJM';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const $ = id => document.getElementById(id);

    $('today').textContent = new Date().toLocaleDateString(undefined,
      { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    // Shared session: show email + logout across all apps (same Supabase project)
    supabase.auth.getSession().then(({ data }) => {
      $('whoami').textContent = data.session ? data.session.user.email : '';
    });
    $('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      $('whoami').textContent = '';
    });
  </script>
</body>
</html>
