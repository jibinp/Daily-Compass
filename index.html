<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Compass — Log</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --field: #0f172a;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-press: #0ea5e9;
      --ok: #22c55e;
      --err: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px 48px;
    }
    .wrap { width: 100%; max-width: 440px; }
    header { text-align: center; margin-bottom: 8px; }
    h1 { font-size: 1.4rem; margin: 0; }
    .date-line {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 24px;
    }
    .field {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .field-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .icon { font-size: 1.3rem; }
    .label { font-weight: 600; font-size: 1.05rem; }
    .row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    input[type="datetime-local"], input[type="email"] {
      flex: 1;
      width: 100%;
      background: var(--field);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
      color-scheme: dark;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .now-btn, .btn {
      background: var(--accent);
      color: #04283a;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .now-btn:active, .btn:active { background: var(--accent-press); transform: scale(0.97); }
    .btn-wide { width: 100%; padding: 14px; font-size: 1rem; margin-top: 4px; }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .note {
      margin-top: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.5;
    }
    .msg { text-align: center; font-size: 0.9rem; margin: 12px 0; min-height: 1.2em; }
    .msg.ok { color: var(--ok); }
    .msg.err { color: var(--err); }
    .hidden { display: none !important; }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.8rem; color: var(--muted); margin-bottom: 16px;
    }
    .link-btn {
      background: none; border: none; color: var(--accent);
      cursor: pointer; font-size: 0.8rem; padding: 0;
    }
    .list { list-style: none; padding: 0; margin: 0; }
    .list li {
      display: flex; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .list li:last-child { border-bottom: none; }
    .list .when { color: var(--muted); }
    h2 { font-size: 1rem; margin: 24px 0 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Daily Compass</h1>
    </header>
    <div class="date-line" id="today"></div>

    <!-- ============ LOGIN VIEW ============ -->
    <div id="loginView" class="hidden">
      <div class="field">
        <div class="field-head"><span class="icon">🔑</span><span class="label">Sign in</span></div>
        <div class="row" style="flex-direction:column; gap:10px;">
          <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
          <button class="btn btn-wide" id="loginBtn">Send magic link</button>
        </div>
      </div>
      <div class="msg" id="loginMsg"></div>
      <div class="note">
        Enter your email. We send a one-time link. Click it to log in — no password.
      </div>
    </div>

    <!-- ============ APP VIEW ============ -->
    <div id="appView" class="hidden">
      <div class="topbar">
        <span id="whoami"></span>
        <button class="link-btn" id="logoutBtn">Log out</button>
      </div>

      <!-- Sequence: wakeup → eat start → eat end → sleep -->
      <div class="field">
        <div class="field-head"><span class="icon">☀️</span><span class="label">Wakeup</span></div>
        <div class="row">
          <input type="datetime-local" id="wakeup" />
          <button class="now-btn" data-target="wakeup">Now</button>
        </div>
      </div>

      <div class="field">
        <div class="field-head"><span class="icon">🍽️</span><span class="label">Eating window — start</span></div>
        <div class="row">
          <input type="datetime-local" id="eat_start" />
          <button class="now-btn" data-target="eat_start">Now</button>
        </div>
      </div>

      <div class="field">
        <div class="field-head"><span class="icon">🏁</span><span class="label">Eating window — end</span></div>
        <div class="row">
          <input type="datetime-local" id="eat_end" />
          <button class="now-btn" data-target="eat_end">Now</button>
        </div>
      </div>

      <div class="field">
        <div class="field-head"><span class="icon">🌙</span><span class="label">Sleep</span></div>
        <div class="row">
          <input type="datetime-local" id="sleep" />
          <button class="now-btn" data-target="sleep">Now</button>
        </div>
      </div>

      <button class="btn btn-wide" id="saveBtn">Save today</button>
      <div class="msg" id="saveMsg"></div>

      <h2>Recent</h2>
      <ul class="list" id="recentList"></ul>

      <div class="note">
        Tap <strong>Now</strong> to fill a field with the current time, or pick a
        date &amp; time manually. Filled fields save when you tap <strong>Save today</strong>.
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // ---- config (safe to expose: anon/publishable key + RLS protect data) ----
    const SUPABASE_URL = 'https://twpzcszcvylhaopcwqkv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_c1BhUlrZPf2YsXW_5LdrZw_-wYh4lJM';

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ================================================================
    // DB — single data-access module (HLD §9). All DB/auth calls here.
    // Swap this one module to change backend later.
    // ================================================================
    const DB = {
      onAuthChange(cb) {
        supabase.auth.onAuthStateChange((_e, session) => cb(session));
      },
      async currentSession() {
        const { data } = await supabase.auth.getSession();
        return data.session;
      },
      async sendMagicLink(email) {
        const { error } = await supabase.auth.signInWithOtp({
          email,
          options: { emailRedirectTo: window.location.href.split('#')[0] },
        });
        if (error) throw error;
      },
      async signOut() {
        await supabase.auth.signOut();
      },
      async addEvent({ aspect, title, datetime, notes }) {
        const { error } = await supabase
          .from('events')
          .insert({ aspect, title, datetime, notes: notes ?? null });
        if (error) throw error;
      },
      async recentEvents(limit = 15) {
        const { data, error } = await supabase
          .from('events')
          .select('aspect, title, datetime')
          .order('datetime', { ascending: false })
          .limit(limit);
        if (error) throw error;
        return data;
      },
    };

    // ================================================================
    // UI helpers
    // ================================================================
    const $ = id => document.getElementById(id);
    const FIELDS = [
      { id: 'wakeup',    label: 'Wakeup' },
      { id: 'eat_start', label: 'Eating start' },
      { id: 'eat_end',   label: 'Eating end' },
      { id: 'sleep',     label: 'Sleep' },
    ];

    function fmtToday() {
      const d = new Date();
      const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      $('today').textContent = d.toLocaleDateString(undefined, opts);
    }
    function localNow() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`
           + `T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function fmtWhen(iso) {
      return new Date(iso).toLocaleString(undefined,
        { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }
    function msg(el, text, kind) {
      el.textContent = text;
      el.className = 'msg' + (kind ? ' ' + kind : '');
    }

    // ================================================================
    // Login view
    // ================================================================
    $('loginBtn').addEventListener('click', async () => {
      const email = $('email').value.trim();
      if (!email) { msg($('loginMsg'), 'Enter your email.', 'err'); return; }
      $('loginBtn').disabled = true;
      msg($('loginMsg'), 'Sending…', '');
      try {
        await DB.sendMagicLink(email);
        msg($('loginMsg'), 'Link sent. Check your email, then click it.', 'ok');
      } catch (e) {
        msg($('loginMsg'), e.message || 'Failed to send link.', 'err');
      } finally {
        $('loginBtn').disabled = false;
      }
    });

    // ================================================================
    // App view
    // ================================================================
    document.querySelectorAll('.now-btn').forEach(btn => {
      btn.addEventListener('click', () => { $(btn.dataset.target).value = localNow(); });
    });

    $('logoutBtn').addEventListener('click', async () => {
      await DB.signOut();
    });

    $('saveBtn').addEventListener('click', async () => {
      const toSave = FIELDS
        .map(f => ({ ...f, value: $(f.id).value }))
        .filter(f => f.value);
      if (!toSave.length) { msg($('saveMsg'), 'Fill at least one field.', 'err'); return; }

      $('saveBtn').disabled = true;
      msg($('saveMsg'), 'Saving…', '');
      try {
        for (const f of toSave) {
          await DB.addEvent({
            aspect: f.id,
            title: f.label,
            datetime: new Date(f.value).toISOString(),
          });
        }
        msg($('saveMsg'), `Saved ${toSave.length} entr${toSave.length === 1 ? 'y' : 'ies'}.`, 'ok');
        FIELDS.forEach(f => { $(f.id).value = ''; });
        await loadRecent();
      } catch (e) {
        msg($('saveMsg'), e.message || 'Save failed.', 'err');
      } finally {
        $('saveBtn').disabled = false;
      }
    });

    async function loadRecent() {
      try {
        const rows = await DB.recentEvents();
        const ul = $('recentList');
        ul.innerHTML = '';
        if (!rows.length) {
          ul.innerHTML = '<li><span class="muted">Nothing yet.</span></li>';
          return;
        }
        for (const r of rows) {
          const li = document.createElement('li');
          li.innerHTML = `<span>${r.title}</span><span class="when">${fmtWhen(r.datetime)}</span>`;
          ul.appendChild(li);
        }
      } catch (e) {
        msg($('saveMsg'), 'Could not load recent: ' + e.message, 'err');
      }
    }

    // ================================================================
    // Route between login / app based on session
    // ================================================================
    function showLogin() {
      $('loginView').classList.remove('hidden');
      $('appView').classList.add('hidden');
    }
    async function showApp(session) {
      $('loginView').classList.add('hidden');
      $('appView').classList.remove('hidden');
      $('whoami').textContent = session.user.email;
      await loadRecent();
    }

    fmtToday();
    DB.onAuthChange(session => {
      if (session) showApp(session); else showLogin();
    });
    // initial check (in case no auth event fires)
    DB.currentSession().then(s => { if (s) showApp(s); else showLogin(); });
  </script>
</body>
</html>
