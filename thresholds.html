<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Thresholds — Daily Compass</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Compass" />
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --field: #0f172a;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-press: #0ea5e9;
      --ok: #22c55e;
      --err: #f87171;
    }
    * { box-sizing: border-box; }
    html { color-scheme: dark; scrollbar-width: none; }
    ::-webkit-scrollbar { display: none; width: 0; height: 0; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 48px;
    }
    .wrap { width: 100%; max-width: 700px; padding: 20px 20px 0; }
    .field {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; margin-bottom: 14px;
    }
    .hidden { display: none !important; }
    /* topbar */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      width: 100%;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.85rem; color: var(--muted);
      padding: calc(12px + env(safe-area-inset-top)) 20px 12px; border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .topbar-title { font-weight: 700; font-size: 1rem; color: var(--text); }
    .link-btn {
      background: none; border: none; color: var(--accent);
      cursor: pointer; font-size: 0.8rem; padding: 0; text-decoration: none;
    }
    /* ---- side drawer nav ---- */
    .hamburger {
      background: none; border: none; color: var(--text);
      font-size: 1.4rem; line-height: 1; cursor: pointer; padding: 0;
    }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 260px; max-width: 82vw;
      background: var(--card); border-right: 1px solid var(--border);
      transform: translateX(-100%); transition: transform 0.22s ease;
      z-index: 110; display: flex; flex-direction: column; gap: 4px;
      padding: 16px 12px;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 8px 6px; margin-bottom: 8px;
    }
    .sidebar-title { font-weight: 700; font-size: 1.05rem; }
    .sidebar-close {
      background: none; border: none; color: var(--muted);
      font-size: 1.2rem; line-height: 1; cursor: pointer; padding: 4px;
    }
    .sidebar-backdrop {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5);
      z-index: 105; opacity: 0; pointer-events: none; transition: opacity 0.22s;
    }
    .sidebar-backdrop.open { opacity: 1; pointer-events: auto; }
    /* ---- tree nav (explorer style) ---- */
    .tree { display: flex; flex-direction: column; gap: 1px; margin-top: 4px; }
    .tnode {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 8px; border-radius: 6px;
      color: var(--text); text-decoration: none; font-size: 0.9rem;
      cursor: pointer; white-space: nowrap; user-select: none;
    }
    .tnode:hover { background: var(--field); }
    .tnode.active { background: var(--field); color: var(--accent); font-weight: 600; }
    .tnode.soon { opacity: 0.5; pointer-events: none; }
    .nav-badge {
      margin-left: auto; background: var(--err); color: #2a0505;
      font-size: 0.68rem; font-weight: 700; line-height: 1;
      border-radius: 999px; padding: 2px 6px;
    }
    .tw { width: 1em; font-size: 0.62rem; color: var(--muted); display: inline-block; text-align: center; transition: transform 0.15s; }
    .tw-sp { width: 1em; display: inline-block; }
    .tchildren { padding-left: 14px; }
    .tchildren.collapsed { display: none; }
    .tfolder.collapsed .tw { transform: rotate(-90deg); }
    /* ---- metric card ---- */
    .metric-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
    .metric-head h2 { margin: 0; font-size: 1rem; }
    .metric-hint { color: var(--muted); font-size: 0.82rem; margin-bottom: 12px; }
    .metric-current { font-size: 1.6rem; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
    .metric-edit { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .metric-edit input {
      flex: 1; background: var(--field); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 10px 12px; font-size: 1rem; color-scheme: dark;
    }
    .metric-edit input:focus { outline: none; border-color: var(--accent); }
    .btn {
      background: var(--accent); color: #06202e; border: none;
      border-radius: 10px; padding: 10px 16px; font-weight: 700; font-size: 0.9rem; cursor: pointer;
    }
    .btn:disabled { opacity: 0.6; }
    .history-toggle { color: var(--muted); font-size: 0.8rem; }
    .history-list { margin-top: 8px; font-size: 0.85rem; color: var(--muted); }
    .history-list .hrow { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); }
    .history-list .hrow:last-child { border-bottom: none; }
    /* ---- band group card (multiple cutoffs, one row) ---- */
    .band-current { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-bottom: 12px; font-size: 0.95rem; }
    .band-current b { color: var(--accent); }
    .band-edit-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .band-edit-row .cutoff-field { flex: 1 1 100px; min-width: 90px; }
    .band-edit-row label { display: block; color: var(--muted); font-size: 0.75rem; margin-bottom: 3px; }
    .band-edit-row input {
      width: 100%; background: var(--field); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 10px 10px; font-size: 0.95rem; color-scheme: dark;
    }
    .band-edit-row input:focus { outline: none; border-color: var(--accent); }
    .msg { text-align: center; font-size: 0.9rem; margin: 12px 0; min-height: 1.2em; }
    .msg.ok { color: var(--ok); }
    .msg.err { color: var(--err); }
  </style>
</head>
<body>
  <!-- ---- side drawer nav ---- -->
  <div class="sidebar-backdrop" id="navBackdrop"></div>
  <nav class="sidebar" id="sidebar" aria-label="Main menu">
    <div class="sidebar-head">
      <span class="sidebar-title">🧭 Daily Compass</span>
      <button class="sidebar-close" id="navClose" aria-label="Close menu">✕</button>
    </div>
    <div class="tree">
      <a class="tnode" href="index.html"><span class="tw-sp"></span>🏠 Home</a>
      <div class="tfolder tnode collapsed" data-group="g-health"><span class="tw">▾</span>🩺 Health Log</div>
      <div class="tchildren collapsed" id="g-health">
        <a class="tnode" href="health-log.html"><span class="tw-sp"></span>Data Entry</a>
        <a class="tnode" href="supplement-tracker.html"><span class="tw-sp"></span>Tablet Ingredient Updater</a>
        <a class="tnode" href="bmi-history.html"><span class="tw-sp"></span>⚖️ BMI/BMR History</a>
        <a class="tnode" href="time-history.html"><span class="tw-sp"></span>☀️ Time History</a>
        <a class="tnode" href="alcohol-history.html"><span class="tw-sp"></span>🍸 Alcohol History</a>
      </div>
      <div class="tfolder tnode collapsed" data-group="g-temp"><span class="tw">▾</span>🗓️ Temporary</div>
      <div class="tchildren collapsed" id="g-temp">
        <div class="tfolder tnode collapsed" data-group="g-pr"><span class="tw">▾</span><svg width="14" height="9" viewBox="0 0 30 20" style="vertical-align:-1px;margin-right:4px;" aria-label="Canada"><rect width="30" height="20" fill="#fff" /><rect width="7.5" height="20" fill="#d52b1e" /><rect x="22.5" width="7.5" height="20" fill="#d52b1e" /><path fill="#d52b1e" d="M15 4l1 2.3 2.3-1-0.6 2.4 2.3 0.3-1.7 1.7 1.7 1.7-2.3 0.3 0.6 2.4-2.3-1-1 2.3-1-2.3-2.3 1 0.6-2.4-2.3-0.3 1.7-1.7-1.7-1.7 2.3-0.3-0.6-2.4 2.3 1z" /></svg>Canadian PR</div>
        <div class="tchildren collapsed" id="g-pr">
          <a class="tnode" href="temporary.html#pool"><span class="tw-sp"></span>📈 Pool breakdown</a>
          <a class="tnode" href="temporary.html#growth"><span class="tw-sp"></span>🌱 Growth</a>
          <a class="tnode" href="temporary.html#draws"><span class="tw-sp"></span>🎯 Draws</a>
          <a class="tnode" href="temporary.html#analysis"><span class="tw-sp"></span>🔍 New candidates</a>
          <a class="tnode" href="temporary.html#stats"><span class="tw-sp"></span>📐 Stats</a>
          <a class="tnode" href="temporary.html#quota"><span class="tw-sp"></span>📊 Quota</a>
        </div>
      </div>
      <div class="tfolder tnode collapsed" data-group="g-settings"><span class="tw">▾</span>⚙️ Settings<span class="nav-badge hidden" id="settingsBadge"></span></div>
      <div class="tchildren collapsed" id="g-settings">
        <a class="tnode" href="developer.html"><span class="tw-sp"></span>🛠️ Developer</a>
        <a class="tnode active" href="thresholds.html"><span class="tw-sp"></span>🎯 Thresholds</a>
      </div>
    </div>
  </nav>

  <div class="topbar">
    <button class="hamburger" id="navToggle" aria-label="Open menu">☰</button>
    <span class="topbar-title">🎯 Thresholds</span>
    <button class="link-btn" id="logoutBtn">Log out</button>
  </div>

  <div class="wrap">
    <div id="appView" class="hidden">
      <div id="metricCards"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // ---- config (anon/publishable key; RLS protects data) ----
    const SUPABASE_URL = 'https://twpzcszcvylhaopcwqkv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_c1BhUlrZPf2YsXW_5LdrZw_-wYh4lJM';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const DB = {
      onAuthChange(cb) { supabase.auth.onAuthStateChange((_e, s) => cb(s)); },
      async currentSession() { const { data } = await supabase.auth.getSession(); return data.session; },
      async signOut() { await supabase.auth.signOut(); },
      // full history for one metric, newest first
      async thresholdHistory(metric_key) {
        const { data, error } = await supabase.from('thresholds')
          .select('value, effective_date')
          .eq('metric_key', metric_key)
          .order('effective_date', { ascending: false });
        if (error) throw error;
        return data;
      },
      async thresholdSet(metric_key, value, effective_date) {
        const { error } = await supabase.from('thresholds')
          .upsert({ metric_key, value, effective_date }, { onConflict: 'metric_key,effective_date' });
        if (error) throw error;
      },
    };

    // Single-value metrics — one card, one number, editable + history.
    const METRICS = [
      {
        key: 'fasting_hours',
        label: 'Fasting duration',
        unit: 'h',
        hint: 'Fasting window (Data Entry summary + Time History column) shows green when it meets or beats this, red otherwise.',
      },
    ];

    // Band-group metrics — several related cutoffs (e.g. sleep's 5 bands),
    // shown as one card with all cutoffs in a single row instead of one
    // card each. All cutoffs in a group are saved together (same
    // effective_date).
    const BAND_GROUPS = [
      {
        label: 'Sleep duration bands',
        hint: 'Time History Sleep column + Data Entry Sleep card colored by band: below the 1st cutoff = Very low (red), up to 2nd = Warning (amber), up to 3rd = OK (green), up to 4th = Bit high (amber), above = Over (red).',
        unit: 'h',
        cutoffs: [
          { key: 'sleep_h_verylow', label: 'Very low <' },
          { key: 'sleep_h_warn', label: 'Warning <' },
          { key: 'sleep_h_ok', label: 'OK <' },
          { key: 'sleep_h_bithigh', label: 'Bit high <' },
        ],
      },
    ];

    const $ = id => document.getElementById(id);
    const todayDate = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    // ---- side drawer nav ----
    const openNav  = () => { $('sidebar').classList.add('open'); $('navBackdrop').classList.add('open'); };
    const closeNav = () => { $('sidebar').classList.remove('open'); $('navBackdrop').classList.remove('open'); };
    $('navToggle').addEventListener('click', openNav);
    $('navClose').addEventListener('click', closeNav);
    $('navBackdrop').addEventListener('click', closeNav);
    (function updateSettingsBadge() {
      try {
        const log = JSON.parse(localStorage.getItem('dc_dev_errors') || '[]');
        const badge = document.getElementById('settingsBadge');
        if (badge && log.length) { badge.textContent = log.length; badge.classList.remove('hidden'); }
      } catch { /* localStorage unavailable */ }
    })();
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeNav(); });
    $('sidebar').addEventListener('click', e => {
      const f = e.target.closest('.tfolder');
      if (f) {
        const g = document.getElementById(f.dataset.group);
        if (g) g.classList.toggle('collapsed');
        f.classList.toggle('collapsed');
        return;
      }
      if (e.target.closest('a.tnode')) closeNav();
    });

    $('logoutBtn').addEventListener('click', async () => { await DB.signOut(); });

    function renderCard(metric, history) {
      const current = history.find(h => h.effective_date <= todayDate());
      const historyRows = history.map(h =>
        `<div class="hrow"><span>${h.effective_date}</span><span>${h.value}${metric.unit}</span></div>`
      ).join('');
      return `
        <section class="field" data-metric="${metric.key}">
          <div class="metric-head"><h2>${metric.label}</h2></div>
          <div class="metric-hint">${metric.hint}</div>
          <div class="metric-current">${current ? `${current.value}${metric.unit}` : '—'}</div>
          <div class="metric-edit">
            <input type="number" step="0.1" class="new-value" placeholder="New value (${metric.unit})" />
            <button class="btn save-btn">Save</button>
          </div>
          <div class="msg" data-msg></div>
          ${history.length ? `<details><summary class="history-toggle">History (${history.length})</summary><div class="history-list">${historyRows}</div></details>` : ''}
        </section>
      `;
    }

    // Merge each cutoff's history into one row per effective_date (they're
    // normally saved together, so dates line up) for a single combined
    // history list instead of 4 separate ones.
    function renderBandCard(group, histories) {
      const byDate = new Map();
      group.cutoffs.forEach((c, i) => {
        for (const h of histories[i]) {
          if (!byDate.has(h.effective_date)) byDate.set(h.effective_date, {});
          byDate.get(h.effective_date)[c.key] = h.value;
        }
      });
      const dates = [...byDate.keys()].sort().reverse();
      // Current value per cutoff, looked up independently (each cutoff may
      // have been edited on a different date, so they don't share one row).
      const currentOf = (i) => {
        const h = histories[i].find(x => x.effective_date <= todayDate());
        return h ? h.value : null;
      };
      const currentLine = group.cutoffs.map((c, i) => {
        const v = currentOf(i);
        return `<span>${c.label} <b>${v != null ? v + group.unit : '—'}</b></span>`;
      }).join('');
      const historyRows = dates.map(d => {
        const row = byDate.get(d);
        const vals = group.cutoffs.map(c => row[c.key] != null ? row[c.key] + group.unit : '—').join(' / ');
        return `<div class="hrow"><span>${d}</span><span>${vals}</span></div>`;
      }).join('');
      const inputs = group.cutoffs.map((c, i) => {
        const v = currentOf(i);
        return `
        <div class="cutoff-field">
          <label>${c.label}</label>
          <input type="number" step="0.1" class="cutoff-input" data-key="${c.key}" placeholder="${v != null ? v : ''}" />
        </div>
      `;
      }).join('');
      return `
        <section class="field" data-band-group="${group.label}">
          <div class="metric-head"><h2>${group.label}</h2></div>
          <div class="metric-hint">${group.hint}</div>
          <div class="band-current">${currentLine}</div>
          <div class="band-edit-row">${inputs}</div>
          <button class="btn save-btn">Save all</button>
          <div class="msg" data-msg></div>
          ${dates.length ? `<details><summary class="history-toggle">History (${dates.length})</summary><div class="history-list">${historyRows}</div></details>` : ''}
        </section>
      `;
    }

    async function loadCards() {
      const container = $('metricCards');
      const cards = [];
      for (const metric of METRICS) {
        const history = await DB.thresholdHistory(metric.key);
        cards.push(renderCard(metric, history));
      }
      for (const group of BAND_GROUPS) {
        const histories = await Promise.all(group.cutoffs.map(c => DB.thresholdHistory(c.key)));
        cards.push(renderBandCard(group, histories));
      }
      container.innerHTML = cards.join('');

      container.querySelectorAll('[data-metric]').forEach(section => {
        const key = section.dataset.metric;
        const msgEl = section.querySelector('[data-msg]');
        const btn = section.querySelector('.save-btn');
        btn.addEventListener('click', async () => {
          const input = section.querySelector('.new-value');
          const val = parseFloat(input.value);
          if (!val && val !== 0) { msgEl.textContent = 'Enter a value.'; msgEl.className = 'msg err'; return; }
          btn.disabled = true;
          try {
            await DB.thresholdSet(key, val, todayDate());
            await loadCards();
          } catch (e) {
            msgEl.textContent = 'Save failed: ' + e.message; msgEl.className = 'msg err';
            btn.disabled = false;
          }
        });
      });

      container.querySelectorAll('[data-band-group]').forEach(section => {
        const label = section.dataset.bandGroup;
        const group = BAND_GROUPS.find(g => g.label === label);
        const msgEl = section.querySelector('[data-msg]');
        const btn = section.querySelector('.save-btn');
        btn.addEventListener('click', async () => {
          const inputs = [...section.querySelectorAll('.cutoff-input')];
          const toSave = inputs
            .map(inp => ({ key: inp.dataset.key, val: parseFloat(inp.value) }))
            .filter(x => !isNaN(x.val));
          if (!toSave.length) { msgEl.textContent = 'Enter at least one value.'; msgEl.className = 'msg err'; return; }
          btn.disabled = true;
          try {
            const today = todayDate();
            for (const { key, val } of toSave) await DB.thresholdSet(key, val, today);
            await loadCards();
          } catch (e) {
            msgEl.textContent = 'Save failed: ' + e.message; msgEl.className = 'msg err';
            btn.disabled = false;
          }
        });
      });
    }

    // ---- route: no session → sign in on the picker page ----
    function showLogin() { window.location.replace('index.html'); }
    async function showApp() {
      $('appView').classList.remove('hidden');
      try { await loadCards(); }
      catch (e) { $('metricCards').innerHTML = `<div class="msg err">Could not load: ${e.message}</div>`; }
    }

    DB.onAuthChange(session => { if (session) showApp(); else showLogin(); });
    DB.currentSession().then(s => { if (s) showApp(); else showLogin(); });
  </script>
</body>
</html>
